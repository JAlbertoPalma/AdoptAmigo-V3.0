<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADOPTAmigo V4.0 - Premium Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4b91;
            --primary-light: #ffebf3;
            --secondary: #ff7676;
            --dark: #1a1a1a;
        }
        body { 
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        .mobile-mockup { 
            width: 375px; height: 812px; 
            background: #ffffff; border-radius: 50px; 
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.3); 
            overflow: hidden; position: relative; 
            border: 10px solid #1a1a1a; 
        }
        #app-content { height: 100%; overflow-y: auto; padding-bottom: 90px; scroll-behavior: smooth; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Glassmorphism Nav */
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            box-shadow: 0 10px 20px -5px rgba(255, 75, 145, 0.4);
        }
        .match-badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

<div class="mobile-mockup">
    <div class="flex justify-between items-center px-8 py-4 text-xs font-extrabold text-gray-900 bg-transparent absolute w-full z-50 top-0 pointer-events-none">
        <span>9:41</span>
        <div class="flex space-x-2 items-center">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
            <div class="w-5 h-2.5 border border-black rounded-sm relative after:content-[''] after:absolute after:w-0.5 after:h-1 after:bg-black after:-right-1 after:top-0.5"></div>
        </div>
    </div>

    <div id="app-content" class="hide-scrollbar"></div>

    <div id="bottom-nav" class="hidden absolute bottom-0 w-full glass-nav flex justify-around py-5 px-6 pb-8 text-gray-400 z-50 rounded-t-[30px]">
        <button class="nav-icon transition-all duration-300" id="nav-home" onclick="irAlMejorMatch()"><i class="fas fa-paw text-xl"></i></button>
        <button class="nav-icon transition-all duration-300" id="nav-search" onclick="navigate('searchScreen')"><i class="fas fa-compass text-xl"></i></button>
        <button class="nav-icon transition-all duration-300" id="nav-status" onclick="navigate('statusScreen')"><i class="fas fa-heart text-xl"></i></button>
        <button class="nav-icon transition-all duration-300" id="nav-user" onclick="navigate('userProfile')"><i class="fas fa-user-circle text-xl"></i></button>
    </div>
</div>

<script>
    const db = {

            nombre: "Ricardo López", 
            correo: "usuario@ejemplo.com",

            mascotasActuales: "1 (Gato)",

            adopcionesRealizadas: 0,
            estiloHogar: "Casa con Patio",
            nivelActividad: "Alto",
            energiaBusqueda: "Media",
            actividadFavorita: "Paseos tranquilos",
            personalidadIdeal: "Cariñosa",
            espacioDisponible: "Pequeño/Medio",
            adopcionesActivas: [],

    let currentAnimationId = null;

    const views = {
        loginScreen: () => `
            <div class="fade-in h-full flex flex-col justify-center p-10 bg-white">
                <div class="text-center mb-10">
                    <div class="w-20 h-20 btn-primary text-white rounded-[28px] flex items-center justify-center mx-auto mb-6 rotate-12 shadow-xl">

                    </div>

                </div>
                
                <div class="space-y-4">
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4">
                        <label class="text-[10px] font-bold text-gray-400 uppercase block mb-1">Correo Electrónico</label>
                        <input type="email" class="w-full bg-transparent text-sm font-bold focus:outline-none" placeholder="ejemplo@correo.com">
                    </div>
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4">

                        <input type="password" class="w-full bg-transparent text-sm font-bold focus:outline-none" placeholder="••••••••">
                    </div>
                    <button onclick="navigate('userForm')" class="w-full btn-primary text-white py-5 rounded-2xl font-extrabold shadow-lg transition active:scale-95">Iniciar Sesión</button>
                    
                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
                        <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-300 font-bold">o</span></div>
                    </div>
                    
                    <button class="w-full py-4 rounded-2xl font-extrabold text-gray-500 border-2 border-gray-100 hover:bg-gray-50 transition">Crear cuenta nueva</button>
                </div>
            </div>
        `,

        userForm: () => `
    <div class="fade-in pt-20 px-8 pb-10 bg-white min-h-full">
        <h1 class="text-3xl font-extrabold text-gray-900 leading-tight mb-2">Tu Match <br><span class="text-[#ff4b91]">Ideal</span></h1>
        <p class="text-gray-400 text-xs font-medium mb-8">Personaliza la búsqueda según tu ritmo de vida.</p>
        
        <div class="space-y-5">
            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <label class="text-[10px] font-extrabold text-gray-400 uppercase block mb-1">Nivel de energía deseado</label>
                <select id="input-energia" class="w-full bg-transparent font-bold text-sm focus:outline-none appearance-none">
                    <option value="Baja (Tranquilo/Sillón)">Baja (Tranquilo / Sofá)</option>
                    <option value="Media (Caminatas diarias)" selected>Media (Caminatas diarias)</option>
                    <option value="Alta (Para correr/deporte)">Alta (Para correr / Deporte)</option>
                </select>
            </div>

            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <label class="text-[10px] font-extrabold text-gray-400 uppercase block mb-1">Actividad principal juntos</label>
                <select id="input-actividad" class="w-full bg-transparent font-bold text-sm focus:outline-none appearance-none">
                    <option value="Ver películas/Estar en casa">Ver películas / Estar en casa</option>
                    <option value="Explorar parques">Explorar parques</option>
                    <option value="Senderismo/Running">Senderismo / Running</option>
                </select>
            </div>

            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <label class="text-[10px] font-extrabold text-gray-400 uppercase block mb-1">Personalidad de la mascota</label>
                <select id="input-personalidad" class="w-full bg-transparent font-bold text-sm focus:outline-none appearance-none">
                    <option value="Independiente">Independiente (A su aire)</option>
                    <option value="Muy Cariñosa" selected>Muy Cariñosa (Pegajosa)</option>
                    <option value="Protectora/Alerta">Protectora / Alerta</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <label class="text-[9px] font-extrabold text-gray-400 uppercase block mb-1">Presupuesto</label>
                    <select id="input-presupuesto" class="w-full bg-transparent font-bold text-[11px] focus:outline-none appearance-none">
                        <option value="$1k - $2k">$1k - $2k</option>
                        <option value="$3k+">$3k+</option>
                    </select>
                </div>
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <label class="text-[9px] font-extrabold text-gray-400 uppercase block mb-1">Vivienda</label>
                    <select id="input-vivienda" class="w-full bg-transparent font-bold text-[11px] focus:outline-none appearance-none">
                        <option value="Departamento">Depto</option>
                        <option value="Casa Patio" selected>Casa Patio</option>
                    </select>
                </div>
            </div>

            <button onclick="guardarPerfilYAnalizar()" class="w-full btn-primary text-white py-5 rounded-2xl font-extrabold shadow-xl mt-4 flex items-center justify-center space-x-3 transition active:scale-95">
                <span>Encontrar mi compañero</span>
                <i class="fas fa-wand-magic-sparkles"></i>
            </button>
        </div>
    </div>`,

        petProfile: (petId) => {
            const pet = db.mascotas.find(p => p.id === petId);
            return `
            <div class="fade-in bg-white pb-32">
                <div class="relative h-[450px]">
                    <img src="${pet.foto}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-white via-transparent to-black/20"></div>
                    <button onclick="navigate('searchScreen')" class="absolute top-14 left-6 w-10 h-10 bg-white/20 backdrop-blur-md rounded-full text-white border border-white/30 flex items-center justify-center">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div class="absolute bottom-10 left-8 right-8">
                        <div class="match-badge inline-flex items-center px-4 py-1.5 rounded-full text-white text-xs font-bold mb-3">
                            <i class="fas fa-sparkles mr-2 text-yellow-300"></i> ${pet.match}% Match IA
                        </div>
                        <h1 class="text-5xl font-extrabold text-gray-900 tracking-tighter">${pet.nombre}</h1>
                        <p class="text-gray-600 font-semibold flex items-center mt-1">
                            <i class="fas fa-location-dot mr-2 text-[#ff4b91]"></i> ${pet.refugio}
                        </p>
                    </div>
                </div>

                <div class="px-8 -mt-5 relative z-10">
                    <div class="grid grid-cols-3 gap-4 mb-8">
                        <div class="bg-gray-50 p-4 rounded-3xl border border-gray-100 text-center">
                            <p class="text-[9px] font-extrabold text-gray-400 uppercase">Edad</p>
                            <p class="font-extrabold text-gray-900">${pet.edad}</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-3xl border border-gray-100 text-center">
                            <p class="text-[9px] font-extrabold text-gray-400 uppercase">Peso</p>
                            <p class="font-extrabold text-gray-900">${pet.peso}</p>
                        </div>
                        <button onclick="navigate('arScreen', ${pet.id})" class="bg-pink-50 p-4 rounded-3xl border border-pink-100 text-center transition active:scale-95">

                            <p class="text-[9px] font-extrabold text-[#ff4b91] uppercase mt-1">Ver AR</p>

                    </div>

                    <div class="mb-8">
                        <h3 class="text-lg font-extrabold text-gray-900 mb-3 font-jakarta">Su Historia</h3>
                        <p class="text-gray-500 leading-relaxed text-sm font-medium">${pet.historia}</p>
                    </div>

                    <div class="bg-gray-900 rounded-[32px] p-7 text-white shadow-2xl mb-8 relative overflow-hidden">
                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-[#ff4b91] blur-[50px] opacity-40"></div>
                        <h3 class="font-extrabold text-xl mb-4 text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-orange-300">¿Por qué es para ti?</h3>
                        <ul class="space-y-4">
                            ${pet.razonesMatch.map(r=>`<li class="flex items-start text-sm font-medium text-gray-300"><i class="fas fa-check-circle text-green-400 mt-1 mr-3"></i> ${r}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="mb-10">
                        <h3 class="text-lg font-extrabold text-gray-900 mb-4">Salud y Certificados</h3>
                        <div class="space-y-3">
                            ${pet.medico.map(m=>`
                                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                    <div class="flex items-center">
                                        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm mr-4">
                                            <i class="fas ${m.icono} ${m.color}"></i>
                                        </div>
                                        <span class="text-sm font-bold text-gray-700">${m.texto}</span>
                                    </div>
                                    <span class="text-[10px] font-extrabold text-green-500 bg-green-50 px-3 py-1 rounded-full uppercase">Verificado</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="flex space-x-4">
                        <button onclick="rechazarMascota(${pet.id})" class="w-20 h-16 bg-gray-100 rounded-2xl text-gray-400 flex items-center justify-center transition active:scale-90"><i class="fas fa-times text-2xl"></i></button>
                        <button onclick="navigate('adoptionFormScreen', ${pet.id})" class="flex-1 btn-primary text-white font-extrabold rounded-2xl shadow-xl transition active:scale-95">ADOPTAR AHORA</button>
                    </div>
                </div>
            </div>`;
        },

        adoptionFormScreen: (petId) => {
            const pet = db.mascotas.find(p => p.id === petId);
            return `
            <div class="fade-in pt-20 px-8 pb-10 bg-white">
                <button onclick="navigate('petProfile', ${petId})" class="mb-4 text-gray-400 font-bold text-xs flex items-center"><i class="fas fa-arrow-left mr-2"></i> VOLVER</button>
                <h2 class="text-2xl font-extrabold text-gray-900 mb-6">Proceso de Adopción</h2>
                
                <div class="space-y-6">
                    <div class="space-y-4">
                        <h3 class="text-xs font-extrabold text-[#ff4b91] uppercase tracking-widest">Preguntas de ${pet.dueñoActual}</h3>
                        <div class="bg-gray-50 p-5 rounded-[24px] border border-gray-100 space-y-4">
                            <div>
                                <label class="text-[11px] font-bold text-gray-600 block mb-2">¿Cuentas con un veterinario de confianza cerca?</label>
                                <input type="text" class="w-full bg-white border border-gray-200 rounded-xl p-3 text-xs focus:outline-none" placeholder="Nombre de la clínica...">
                            </div>
                            <div>
                                <label class="text-[11px] font-bold text-gray-600 block mb-2">¿Quién cuidará de ${pet.nombre} si sales de viaje?</label>

                            </div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3 class="text-xs font-extrabold text-gray-900 uppercase tracking-widest">Verificación de Identidad</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="border-2 border-dashed border-gray-200 rounded-2xl p-4 text-center cursor-pointer hover:bg-gray-50 transition">
                                <i class="fas fa-id-card text-gray-300 text-xl mb-2"></i>
                                <p class="text-[9px] font-extrabold text-gray-400 uppercase">Identificación (INE/Pasaporte)</p>
                            </div>
                            <div class="border-2 border-dashed border-gray-200 rounded-2xl p-4 text-center cursor-pointer hover:bg-gray-50 transition">
                                <i class="fas fa-file-invoice text-gray-300 text-xl mb-2"></i>
                                <p class="text-[9px] font-extrabold text-gray-400 uppercase">Comprobante Domicilio</p>
                            </div>
                        </div>
                        <p class="text-[9px] text-gray-400 font-medium text-center"><i class="fas fa-shield-halved mr-1"></i> Tus datos están protegidos por encriptación de extremo a extremo.</p>
                    </div>

                    <button onclick="enviarSolicitud(${petId})" class="w-full btn-primary text-white py-5 rounded-2xl font-extrabold shadow-xl mt-4 transition active:scale-95">Finalizar y Enviar Solicitud</button>
                </div>
            </div>`;
        },

        chatScreen: (petId) => {
            const pet = db.mascotas.find(p => p.id === petId);
            return `
            <div class="fade-in h-full flex flex-col bg-gray-50">
                <div class="pt-14 pb-4 px-6 bg-white flex items-center shadow-sm">
                    <button onclick="navigate('statusScreen')" class="mr-4 text-gray-400"><i class="fas fa-chevron-left text-xl"></i></button>
                    <img src="${pet.foto}" class="w-10 h-10 rounded-full object-cover mr-3">
                    <div>
                        <h4 class="font-extrabold text-sm text-gray-900">${pet.dueñoActual}</h4>
                        <p class="text-[10px] text-green-500 font-bold uppercase">En línea ahora</p>
                    </div>
                </div>

                <div class="flex-1 p-6 space-y-4 overflow-y-auto" id="chat-messages">
                    <div class="flex justify-start">
                        <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[80%]">
                            <p class="text-sm font-medium text-gray-600 italic">¡Hola! He recibido tu solicitud para adoptar a ${pet.nombre}. Revisaré tu perfil y te contactaré pronto.</p>
                        </div>
                    </div>
                </div>

                <div class="p-6 pb-10 bg-white">
                    <div class="flex items-center bg-gray-100 rounded-2xl px-4 py-2">
                        <input type="text" placeholder="Escribe un mensaje..." class="flex-1 bg-transparent py-2 text-sm focus:outline-none font-medium">
                        <button class="text-[#ff4b91] ml-2"><i class="fas fa-paper-plane text-xl"></i></button>
                    </div>
                </div>
            </div>`;
        },

        arScreen: (id) => `
            <div class="fade-in bg-black h-full relative">
                <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80')] bg-cover bg-center opacity-60"></div>
                <div id="canvas-container" class="absolute inset-0 z-10"></div>
                <button onclick="navigate('petProfile', ${id})" class="absolute top-14 left-6 z-20 w-12 h-12 bg-black/40 backdrop-blur-md rounded-full text-white border border-white/20 flex items-center justify-center"><i class="fas fa-times"></i></button>
                <div class="absolute bottom-12 left-8 right-8 z-20">
                    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-5 rounded-[24px] text-center">
                        <p class="text-white font-bold text-sm mb-1">Modo Visualización Real</p>
                        <p class="text-white/60 text-[10px]">Utiliza el suelo como referencia de tamaño (Regla de 30cm incluida)</p>
                    </div>
                </div>
            </div>`,

        searchScreen: (f='Todos') => {
            let m=db.mascotas; if(f==='Perros') m=m.filter(p=>p.especie==='Perro'); if(f==='Gatos') m=m.filter(p=>p.especie==='Gato');
            return `<div class="fade-in pt-20 px-8 bg-white min-h-full">
                <h2 class="text-3xl font-extrabold text-gray-900 mb-6">Explorar</h2>
                <div class="flex space-x-3 mb-8 overflow-x-auto hide-scrollbar">
                    ${['Todos','Perros','Gatos'].map(x=>`<button onclick="navigate('searchScreen','${x}')" class="px-6 py-2.5 rounded-full text-xs font-extrabold whitespace-nowrap transition-all ${f===x?'btn-primary text-white':'bg-gray-100 text-gray-400'}">${x.toUpperCase()}</button>`).join('')}
                </div>
                <div class="space-y-6">
                    ${m.map(p=>`
                        <div onclick="navigate('petProfile', ${p.id})" class="relative group cursor-pointer">
                            <img src="${p.foto}" class="w-full h-48 rounded-[32px] object-cover shadow-lg">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent rounded-[32px]"></div>
                            <div class="absolute bottom-5 left-6 right-6 flex justify-between items-end">
                                <div>
                                    <h3 class="text-white font-extrabold text-xl">${p.nombre}</h3>
                                    <p class="text-white/70 text-xs font-bold">${p.especie} • ${p.edad}</p>
                                </div>
                                <div class="bg-[#ff4b91] text-white px-3 py-1 rounded-full text-[10px] font-extrabold">${p.match}% MATCH</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        },

        statusScreen: () => `
            <div class="fade-in pt-20 px-8 h-full bg-white">
                <h2 class="text-3xl font-extrabold text-gray-900 mb-8">Mis Procesos</h2>
                ${db.usuario.adopcionesActivas.length ? db.usuario.adopcionesActivas.map(a=>{
                    const p=db.mascotas.find(x=>x.id===a.idMascota); 
                    return `
                    <div class="bg-gray-50 rounded-[32px] p-6 border border-gray-100 mb-6">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center">
                                <img src="${p.foto}" class="w-14 h-14 rounded-2xl object-cover mr-4 shadow-md">
                                <div>
                                    <h3 class="font-extrabold text-gray-900">${p.nombre}</h3>
                                    <p class="text-[10px] font-bold text-[#ff4b91] uppercase tracking-tighter">En Revisión</p>
                                </div>
                            </div>
                            <button onclick="navigate('chatScreen', ${p.id})" class="w-12 h-12 bg-white rounded-2xl shadow-sm text-[#ff4b91] flex items-center justify-center border border-pink-50"><i class="fas fa-comment-dots text-xl"></i></button>
                        </div>
                        <div class="relative pl-6 space-y-8 before:absolute before:left-[11px] before:top-2 before:h-[80%] before:w-[2px] before:bg-pink-100">
                            <div class="relative flex items-center">
                                <div class="absolute left-[-20px] h-3 w-3 rounded-full bg-[#ff4b91] ring-4 ring-pink-50"></div>
                                <span class="text-xs font-bold text-gray-400">Formulario Enviado</span>
                            </div>
                            <div class="relative flex items-center">
                                <div class="absolute left-[-22px] h-4 w-4 rounded-full bg-white border-4 border-[#ff4b91] animate-pulse"></div>
                                <span class="text-xs font-extrabold text-gray-900">Validación de Perfil IA</span>
                            </div>
                        </div>
                    </div>`
                }).join('') : `
                <div class="text-center py-20">
                    <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-200"><i class="fas fa-heart-circle-xmark text-4xl"></i></div>
                    <p class="text-gray-400 font-bold text-sm">No tienes solicitudes activas</p>
                </div>`}
            </div>`,

        userProfile: () => `
    <div class="fade-in pt-20 px-8 pb-10 bg-white min-h-full">
        <div class="flex items-center space-x-4 mb-8">
            <img src="${db.usuario.foto}" class="w-16 h-16 rounded-2xl object-cover shadow-lg">
            <div>
                <h2 class="text-xl font-extrabold text-gray-900">${db.usuario.nombre}</h2>
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Nivel Pro Adoptante</p>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-gray-900 rounded-[32px] p-6 text-white shadow-2xl relative overflow-hidden">
                <div class="absolute right-0 top-0 p-4 opacity-10 text-5xl"><i class="fas fa-bolt"></i></div>
                <h3 class="text-[10px] font-extrabold text-[#ff4b91] uppercase tracking-[0.2em] mb-4">Busco una mascota...</h3>
                
                <div class="space-y-3">
                    <div class="flex justify-between items-center border-b border-white/10 pb-2">
                        <span class="text-xs text-gray-400">Energía:</span>
                        <span class="text-xs font-bold">${db.usuario.energiaBusqueda}</span>
                    </div>
                    <div class="flex justify-between items-center border-b border-white/10 pb-2">
                        <span class="text-xs text-gray-400">Actividad:</span>
                        <span class="text-xs font-bold">${db.usuario.actividadFavorita}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-400">Carácter:</span>
                        <span class="text-xs font-bold">${db.usuario.personalidadIdeal}</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gray-50 p-4 rounded-3xl border border-gray-100">
                    <p class="text-[10px] font-extrabold text-gray-400 uppercase">Hogar</p>
                    <p class="text-xs font-bold text-gray-900">${db.usuario.estiloHogar}</p>
                </div>
                <div class="bg-gray-50 p-4 rounded-3xl border border-gray-100">
                    <p class="text-[10px] font-extrabold text-gray-400 uppercase">Presupuesto</p>
                    <p class="text-xs font-bold text-gray-900">${db.usuario.presupuesto}</p>
                </div>
            </div>

            <button onclick="navigate('loginScreen')" class="w-full py-5 rounded-2xl font-extrabold text-red-500 bg-red-50 transition active:scale-95">Cerrar Sesión</button>
        </div>
    </div>`,
    };

    /**************************************************************
     * CONTROLADOR Y LÓGICA
     **************************************************************/
    function navigate(view, data=null) {
        const app=document.getElementById('app-content'), nav=document.getElementById('bottom-nav');
        
        // Mostrar/Ocultar Nav
        if(['loginScreen','userForm','arScreen'].includes(view)) nav.classList.add('hidden'); 
        else nav.classList.remove('hidden');

        if(currentAnimationId) { cancelAnimationFrame(currentAnimationId); currentAnimationId=null; }
        
        // Actualizar iconos Nav
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('text-[#ff4b91]', 'scale-125'));
        if(['petProfile','noMorePetsScreen'].includes(view)) document.getElementById('nav-home').classList.add('text-[#ff4b91]', 'scale-125');
        if(view==='searchScreen') document.getElementById('nav-search').classList.add('text-[#ff4b91]', 'scale-125');
        if(view==='statusScreen' || view==='chatScreen') document.getElementById('nav-status').classList.add('text-[#ff4b91]', 'scale-125');
        if(view==='userProfile') document.getElementById('nav-user').classList.add('text-[#ff4b91]', 'scale-125');

        app.innerHTML = '';
        setTimeout(() => { 
            if(views[view]) { 
                app.innerHTML=views[view](data); 
                if(view==='arScreen') init3DPet(data); 
            } 
        }, 50);
    }

    function guardarPerfilYAnalizar() {
    db.usuario.energiaBusqueda = document.getElementById('input-energia').value;
    db.usuario.actividadFavorita = document.getElementById('input-actividad').value;
    db.usuario.personalidadIdeal = document.getElementById('input-personalidad').value;
    
    db.usuario.presupuesto = document.getElementById('input-presupuesto').value;
    db.usuario.estiloHogar = document.getElementById('input-vivienda').value;

    irAlMejorMatch();
}

    function irAlMejorMatch() {
        const sorted = [...db.mascotas].sort((a,b)=>b.match - a.match);
        navigate('petProfile', sorted[0].id);
    }

    function rechazarMascota(id) {
        const sorted = [...db.mascotas].sort((a,b)=>b.match - a.match);
        const idx = sorted.findIndex(p=>p.id === id);
        if(idx + 1 < sorted.length) navigate('petProfile', sorted[idx+1].id);
        else navigate('searchScreen');
    }

    /**************************************************************
     * MOTOR 3D REFINADO
     **************************************************************/
    function init3DPet(petId) {
        const container = document.getElementById('canvas-container');
        if(!container) return;
        const pet = db.mascotas.find(p => p.id === petId);
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, container.clientWidth/container.clientHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);
        
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Iluminación mejorada
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const spotLight = new THREE.SpotLight(0xffffff, 1);
        spotLight.position.set(5, 10, 5);
        scene.add(spotLight);

        // Geometría del animal (Voxel Style)
        const petGroup = new THREE.Group();
        const material = new THREE.MeshPhongMaterial({ color: pet.color3D, shininess: 30 });
        
        const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 3), material);
        body.position.y = 1.5;
        petGroup.add(body);

        const head = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), material);
        head.position.set(0, 2.5, 1.8);
        petGroup.add(head);

        // Piernas
        const legGeo = new THREE.BoxGeometry(0.5, 1.5, 0.5);
        for(let i=0; i<4; i++) {
            const leg = new THREE.Mesh(legGeo, material);
            leg.position.set(i<2?0.6:-0.6, 0.75, i%2===0?1.1:-1.1);
            petGroup.add(leg);
        }

        petGroup.scale.set(pet.escala3D, pet.escala3D, pet.escala3D);
        scene.add(petGroup);

        // Referencia de suelo (Regla de Realidad Aumentada)
        const ruler = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 0.5), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
        ruler.position.set(0, 0, 0);
        scene.add(ruler);

        function animate() {
            currentAnimationId = requestAnimationFrame(animate);
            petGroup.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    }

    function enviarSolicitud(petId) {
    if(!db.usuario.adopcionesActivas.find(a => a.idMascota === petId)) {
        db.usuario.adopcionesActivas.push({ 
            idMascota: petId, 
            fecha: new Date().toLocaleDateString(),
            estado: "Validación de Perfil" 
        });
    }
    
    db.usuario.chats[petId] = [];

    navigate('chatScreen', petId);
}

    window.onload = () => navigate('loginScreen');
</script>
</body>
