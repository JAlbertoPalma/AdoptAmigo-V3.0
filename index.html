<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADOPTAmigo V11.0 - Prototipo Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .mobile-mockup { width: 375px; height: 812px; background: white; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; position: relative; border: 8px solid #1f2937; }
        #app-content { height: 100%; overflow-y: auto; padding-bottom: 80px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .chat-bubble-received { background-color: #f3f4f6; color: #1f2937; border-radius: 20px 20px 20px 4px; padding: 12px 16px; max-width: 80%; }
        .chat-bubble-sent { background-color: #ec4899; color: white; border-radius: 20px 20px 4px 20px; padding: 12px 16px; max-width: 80%; align-self: flex-end; }
    </style>
</head>
<body>

<div class="mobile-mockup">
    <!-- BARRA DE ESTADO -->
    <div class="flex justify-between items-center px-6 py-3 text-xs font-bold text-gray-800 bg-white/80 backdrop-blur-sm absolute w-full z-50 top-0 pointer-events-none">
        <span>9:41</span>
        <div class="flex space-x-2"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></div>
    </div>

    <!-- CONTENEDOR DE PANTALLAS -->
    <div id="app-content" class="hide-scrollbar"></div>

    <!-- NAVEGACIÓN INFERIOR -->
    <div id="bottom-nav" class="hidden absolute bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-4 px-6 pb-6 text-gray-400 z-50">
        <i class="fas fa-home cursor-pointer transition nav-icon" id="nav-home" onclick="irAlMejorMatch()"></i>
        <i class="fas fa-search cursor-pointer transition nav-icon" id="nav-search" onclick="navigate('searchScreen')"></i>
        <i class="fas fa-heart cursor-pointer transition nav-icon" id="nav-status" onclick="navigate('statusScreen')"></i>
        <i class="fas fa-user cursor-pointer transition nav-icon" id="nav-user" onclick="navigate('userProfile')"></i>
    </div>
</div>

<script>
    /**************************************************************
     * 1. BASE DE DATOS COMPLETA
     **************************************************************/
    const db = {
        usuario: { 
            nombre: "Joel Borbón", correo: "joel.borbon@ejemplo.com", 
            foto: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80", 
            estiloHogar: "Casa con Patio", nivelActividad: "Muy Activo", adopcionesActivas: [] 
        },
        mascotas: [
            { 
                id: 1, nombre: "Bruno", edad: "2 Años", peso: "14 kg", sexo: "Macho", especie: "Perro", 
                refugio: "Refugio Esperanza", dueñoActual: "Ana", fotoDueño: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80", 
                match: 95, historia: "Fui rescatado cerca del centro de Obregón tras una fuerte tormenta. Soy un explorador nato y muy leal.", 
                datoDivertido: "Por inquieto me resbalé persiguiendo una mariposa dentro de casa. ¡Aún la busco!", 
                foto: "https://images.unsplash.com/photo-1543466835-00a7907e9de1?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80", 
                atributos: [{ icono: "fa-bolt", color: "yellow", texto: "Activo" }, { icono: "fa-paw", color: "purple", texto: "Sociable" }], 
                medico: [{ estado: "Listo", icono: "fa-syringe text-green-500", texto: "Vacunas al día" }, { estado: "Listo", icono: "fa-scissors text-green-500", texto: "Esterilizado" }],
                preguntasFormulario: ["¿Tu patio está bardeado?", "¿Paseo diario de 1 hora?"],
                razonesMatch: ["Tu patio es ideal para mi energía.", "Tu estilo de vida activo encaja conmigo."],
                escala3D: 1.0, color3D: 0x8B4513 
            },
            { 
                id: 2, nombre: "Luna", edad: "6 Meses", peso: "3 kg", sexo: "Hembra", especie: "Gato", 
                refugio: "Gatitos QRO", dueñoActual: "Carlos", fotoDueño: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80", 
                match: 82, historia: "Me encontraron en un motor. Ronroneo mucho y me encantan las cajas.", 
                datoDivertido: "Le tengo miedo a mis propios estornudos.", 
                foto: "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80", 
                atributos: [{ icono: "fa-bed", color: "indigo", texto: "Tranquila" }], 
                medico: [{ estado: "Listo", icono: "fa-syringe text-green-500", texto: "Triple Felina" }],
                preguntasFormulario: ["¿Tienes otras mascotas?", "¿Será gatita de interiores?"],
                razonesMatch: ["Buscas compañía tranquila.", "Tu hogar es seguro para mí."],
                escala3D: 0.5, color3D: 0xFFA500 
            },
            { 
                id: 3, nombre: "Max", edad: "5 Años", peso: "35 kg", sexo: "Macho", especie: "Perro", 
                refugio: "Grandes Amigos", dueñoActual: "Roberto", fotoDueño: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80", 
                match: 75, historia: "Perro gigante que cree que es un cachorro faldero.", 
                datoDivertido: "Ronco tan fuerte que parezco un motor viejo.", 
                foto: "https://images.unsplash.com/photo-1534361960057-19889db9621e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80", 
                atributos: [{ icono: "fa-shield-dog", color: "gray", texto: "Protector" }], 
                medico: [{ estado: "Pendiente", icono: "fa-tooth text-yellow-500", texto: "Limpieza Dental" }],
                preguntasFormulario: ["¿Tienes barda de 2 metros?", "¿Puedes costear su dieta?"],
                razonesMatch: ["Necesito espacio grande.", "Me encantaría cuidarte."],
                escala3D: 1.6, color3D: 0x222222 
            }
        ]
    };

    /**************************************************************
     * 2. MOTOR 3D (AR)
     **************************************************************/
    let currentAnimationId = null;
    function init3DPet(petId) {
        const container = document.getElementById('canvas-container');
        if(!container) return;
        container.innerHTML = ''; if(currentAnimationId) cancelAnimationFrame(currentAnimationId);
        const pet = db.mascotas.find(p => p.id === petId);
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 0.1, 1000);
        camera.position.set(0, 5, 12); camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true; container.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(5, 10, 7); scene.add(dirLight);
        const petGroup = new THREE.Group();
        const mat = new THREE.MeshLambertMaterial({ color: pet.color3D });
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 2.5), mat); body.position.y = 0.6; petGroup.add(body);
        const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), mat); head.position.set(0, 1.6, 1.5); petGroup.add(head);
        for(let i=0; i<4; i++) {
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), mat);
            leg.position.set((i%2===0)?0.5:-0.5, 0, (i<2)?1.0:-1.0); leg.geometry.translate(0, 0.6, 0); petGroup.add(leg);
        }
        petGroup.scale.set(pet.escala3D, pet.escala3D, pet.escala3D); petGroup.position.set(1, 0, 0); scene.add(petGroup);
        const ruler = new THREE.Mesh(new THREE.BoxGeometry(3, 0.05, 0.3), new THREE.MeshLambertMaterial({ color: 0xeab308 }));
        ruler.position.set(-2, 0.025, 0); scene.add(ruler);
        function animate() { currentAnimationId = requestAnimationFrame(animate); petGroup.rotation.y += 0.01; renderer.render(scene, camera); }
        animate();
    }

    /**************************************************************
     * 3. VISTAS
     **************************************************************/
    const views = {
        loginScreen: () => `
            <div class="fade-in bg-white h-full flex flex-col justify-center px-10 relative">
                <div class="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-pink-100 rounded-full blur-3xl opacity-50"></div>
                <div class="text-center mb-12">
                    <div class="w-20 h-20 bg-gray-900 text-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl"><i class="fas fa-paw text-4xl"></i></div>
                    <h1 class="text-3xl font-black text-gray-900 tracking-tight">ADOPT<span class="text-pink-500">Amigo</span></h1>
                </div>
                <button onclick="navigate('userForm')" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold shadow-lg transform transition active:scale-95">Iniciar Sesión</button>
            </div>
        `,

        userForm: () => `
            <div class="fade-in pt-24 px-8 pb-20">
                <h1 class="text-3xl font-bold text-gray-900 mb-4">Tu Perfil IA</h1>
                <p class="text-sm text-gray-500 mb-8 leading-relaxed">Configura tus preferencias para que nuestro algoritmo encuentre a tu mascota ideal.</p>
                <div class="space-y-6">
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-3 tracking-widest">Vivienda</label>
                        <button class="w-full bg-blue-50 border-2 border-blue-500 text-blue-600 py-3 rounded-xl font-bold">Casa con Patio</button>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-3 tracking-widest">Actividad</label>
                        <input type="range" class="w-full accent-pink-500" value="85">
                    </div>
                </div>
                <button onclick="irAlMejorMatch()" class="w-full mt-10 bg-gradient-to-r from-pink-500 to-orange-400 text-white py-4 rounded-2xl font-bold shadow-xl">Calcular mi Match IA <i class="fas fa-sparkles ml-2"></i></button>
            </div>
        `,

        petProfile: (petId) => {
            const pet = db.mascotas.find(p => p.id === petId);
            return `
            <div class="fade-in bg-gray-50 pb-24">
                <div class="relative h-96">
                    <img src="${pet.foto}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    <div class="absolute bottom-6 left-6 right-6 flex justify-between items-end text-white">
                        <div><h1 class="text-4xl font-black">${pet.nombre}</h1><p class="text-sm font-medium opacity-80">${pet.refugio}</p></div>
                        <button onclick="navigate('arScreen', ${pet.id})" class="bg-white/20 p-4 rounded-full border border-white/40"><i class="fa-solid fa-vr-cardboard text-2xl"></i></button>
                    </div>
                </div>
                <div class="px-6 -mt-6 relative z-10">
                    <!-- Cards de Info -->
                    <div class="bg-white p-5 rounded-3xl shadow-xl flex justify-between mb-6 text-center">
                        <div class="w-1/3 border-r"><p class="text-[10px] font-bold text-gray-400 uppercase">Match IA</p><p class="font-black text-pink-500">${pet.match}%</p></div>
                        <div class="w-1/3 border-r"><p class="text-[10px] font-bold text-gray-400 uppercase">Edad</p><p class="font-black">${pet.edad}</p></div>
                        <div class="w-1/3"><p class="text-[10px] font-bold text-gray-400 uppercase">Peso</p><p class="font-black">${pet.peso}</p></div>
                    </div>

                    <!-- Dato Divertido -->
                    <div class="bg-yellow-50 p-5 rounded-2xl mb-6 border border-yellow-200 relative">
                        <h3 class="font-bold text-yellow-800 mb-1 text-sm"><i class="fas fa-star mr-2"></i> Algo divertido de mí...</h3>
                        <p class="text-sm text-yellow-700 font-medium italic">"${pet.datoDivertido}"</p>
                    </div>

                    <!-- Historia -->
                    <h3 class="font-bold text-lg text-gray-900 mb-2">Mi Historia</h3>
                    <p class="text-gray-600 text-sm leading-relaxed mb-6 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">${pet.historia}</p>

                    <!-- Carnet de Salud -->
                    <h3 class="font-bold text-lg text-gray-900 mb-3 flex justify-between items-center">Salud y Cuidados <span class="text-[8px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded">BLOCKCHAIN VERIFIED</span></h3>
                    <div class="bg-white rounded-2xl border p-2 mb-8">
                        ${pet.medico.map(m=>`<div class="flex items-center justify-between p-3 border-b last:border-0"><div class="flex items-center text-xs font-bold"><i class="fas ${m.icono} mr-3"></i> ${m.texto}</div><span class="text-[10px] text-green-600 font-bold">${m.estado}</span></div>`).join('')}
                    </div>

                    <!-- Match IA Card -->
                    <div class="bg-gray-900 rounded-3xl p-6 text-white shadow-xl mb-8">
                        <h3 class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-orange-400 mb-4 text-xl">¿Por qué haríamos equipo?</h3>
                        <ul class="space-y-3 text-sm text-gray-300">
                            ${pet.razonesMatch.map(r=>`<li class="flex items-start"><i class="fas fa-check-circle text-green-400 mt-1 mr-3"></i> ${r}</li>`).join('')}
                        </ul>
                    </div>

                    <!-- Botones de Acción -->
                    <div class="flex space-x-4 mb-10">
                        <button onclick="rechazarMascota(${pet.id})" class="bg-white border text-gray-300 p-5 rounded-2xl hover:text-red-500 transition shadow-sm"><i class="fas fa-times text-2xl"></i></button>
                        <button onclick="navigate('adoptionFormScreen', ${pet.id})" class="flex-1 bg-pink-500 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-pink-600">ADOPTAR <i class="fas fa-paw ml-2"></i></button>
                    </div>
                </div>
            </div>`;
        },

        arScreen: (id) => `
            <div class="fade-in bg-gray-900 h-full relative">
                <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80')] bg-cover bg-center"></div>
                <div id="canvas-container" class="absolute inset-0 z-10"></div>
                <button onclick="navigate('petProfile', ${id})" class="absolute top-12 left-6 z-20 bg-black/40 p-3 rounded-full text-white border"><i class="fas fa-chevron-left"></i></button>
                <div class="absolute bottom-10 left-6 right-6 z-20 text-center"><span class="bg-black/60 text-white text-[10px] font-bold px-4 py-2 rounded-full border">Referencia: Regla 30cm sobre suelo real</span></div>
            </div>`,

        searchScreen: (f='Todos') => {
            let m=db.mascotas; if(f==='Perros') m=m.filter(p=>p.especie==='Perro'); if(f==='Gatos') m=m.filter(p=>p.especie==='Gato');
            return `<div class="fade-in pt-16 px-6 bg-gray-50 min-h-full pb-24"><h2 class="text-2xl font-black mb-6">Explorar</h2>
                <div class="flex space-x-2 mb-6">${['Todos','Perros','Gatos'].map(x=>`<button onclick="navigate('searchScreen','${x}')" class="${f===x?'bg-gray-900 text-white':'bg-white text-gray-500 border'} px-5 py-2 rounded-full text-xs font-bold">${x}</button>`).join('')}</div>
                ${m.map(p=>`<div onclick="navigate('petProfile', ${p.id})" class="bg-white p-3 rounded-2xl border mb-4 flex items-center cursor-pointer"><img src="${p.foto}" class="w-16 h-16 rounded-xl object-cover mr-4"><div class="flex-1"><div class="flex justify-between"><h3 class="font-bold text-sm">${p.nombre}</h3><span class="text-pink-500 font-black text-xs">${p.match}%</span></div><p class="text-[10px] text-gray-400">${p.especie} • ${p.edad}</p></div></div>`).join('')}</div>`;
        },

        adoptionFormScreen: (id) => {
            const pet = db.mascotas.find(p=>p.id===id);
            return `<div class="fade-in pt-16 px-8 h-full bg-white"><div class="flex items-center mb-10"><button onclick="navigate('petProfile', ${id})" class="mr-4"><i class="fas fa-arrow-left"></i></button><h2 class="text-xl font-bold">Solicitud</h2></div>
                <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100 flex items-center mb-8"><img src="${pet.fotoDueño}" class="w-10 h-10 rounded-full mr-4"><p class="text-xs font-bold text-blue-700">${pet.dueñoActual} evaluará tu perfil.</p></div>
                ${pet.preguntasFormulario.map((q,i)=>`<div class="mb-6"><p class="text-sm font-bold mb-3">${i+1}. ${q}</p><button class="w-full bg-gray-50 border p-3 rounded-xl text-left text-xs text-gray-500 font-bold"><i class="fas fa-check-circle mr-2 text-green-500"></i> Sí, me comprometo</button></div>`).join('')}
                <button onclick="confirmar(${id})" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold mt-4 shadow-xl">Enviar a ${pet.dueñoActual}</button></div>`;
        },

        statusScreen: () => `<div class="fade-in pt-16 px-6 h-full bg-white pb-24"><h2 class="text-2xl font-black mb-6">Mis Adopciones</h2>${db.usuario.adopcionesActivas.length ? db.usuario.adopcionesActivas.map(a=>{const p=db.mascotas.find(x=>x.id===a.idMascota); return `<div class="bg-pink-50 p-4 rounded-2xl border border-pink-100 flex items-center justify-between mb-8 shadow-sm"><div class="flex items-center"><img src="${p.foto}" class="w-14 h-14 rounded-full mr-4 border-4 border-white"><h3 class="font-black">${p.nombre}</h3></div><button onclick="navigate('chatScreen', ${p.id})" class="text-pink-500 p-3 bg-white rounded-full shadow-sm"><i class="fas fa-comment"></i></button></div><div class="relative pl-8 space-y-10 before:absolute before:inset-0 before:ml-10 before:h-full before:w-0.5 before:bg-gray-100"><div class="relative flex items-center"><div class="absolute left-0 -ml-3 h-6 w-6 rounded-full bg-pink-500 border-4 border-white"></div><h4 class="font-bold text-sm ml-8">Formulario Enviado</h4></div><div class="relative flex items-center"><div class="absolute left-0 -ml-4 h-8 w-8 rounded-full bg-white border-4 border-pink-500 flex items-center justify-center animate-pulse"><div class="w-2 h-2 bg-pink-500 rounded-full"></div></div><h4 class="font-bold text-sm ml-8 text-pink-600">Entrevista / Chat</h4></div></div>`}).join('') : '<p class="text-center text-gray-400 py-20">No hay procesos activos.</p>'}</div>`,

        chatScreen: (id) => `<div class="fade-in h-full flex flex-col"><div class="pt-12 pb-4 px-6 border-b flex items-center"><button onclick="navigate('statusScreen')" class="mr-4 text-gray-400"><i class="fas fa-arrow-left"></i></button><h2 class="font-bold">Chat Directo</h2></div><div class="flex-1 p-6 bg-gray-50"><div class="chat-bubble-received text-sm mb-4 font-medium">¡Hola Joel! Tu perfil de IA es impresionante. ¿Hacemos videollamada para conocer a la mascota?</div></div><div class="p-6 border-t pb-10"><input type="text" placeholder="Escribe..." class="w-full bg-gray-100 p-4 rounded-full text-sm outline-none" disabled></div></div>`,

        userProfile: () => `<div class="fade-in pt-16 px-8 text-center h-full flex flex-col justify-center"><img src="${db.usuario.foto}" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-white shadow-xl"><h2 class="text-2xl font-black">${db.usuario.nombre}</h2><p class="text-gray-400 mb-10">${db.usuario.correo}</p><div class="bg-gray-50 p-6 rounded-3xl text-left border mb-10"><p class="text-[10px] font-bold text-gray-400 uppercase mb-4">Ajustes de IA</p><div class="flex justify-between text-sm mb-2"><span>Hogar</span><span class="font-bold">${db.usuario.estiloHogar}</span></div><div class="flex justify-between text-sm"><span>Actividad</span><span class="font-bold">${db.usuario.nivelActividad}</span></div></div><button onclick="navigate('loginScreen')" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl font-bold border border-red-100 shadow-sm">Cerrar Sesión</button></div>`,
        
        noMorePetsScreen: () => `<div class="fade-in pt-32 px-10 text-center"><div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fas fa-search text-4xl text-gray-300"></i></div><h2 class="text-2xl font-bold mb-4">Fin de la Búsqueda</h2><p class="text-gray-500 text-sm mb-12">Has visto todas las mascotas. Intenta cambiar tu estilo de vida para ver nuevos resultados.</p><button onclick="navigate('searchScreen')" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold shadow-lg">Reiniciar Exploración</button></div>`
    };

    /**************************************************************
     * 4. CONTROLADOR
     **************************************************************/
    function irAlMejorMatch() {
        const sorted = [...db.mascotas].sort((a,b)=>b.match - a.match);
        navigate('petProfile', sorted[0].id);
    }

    function rechazarMascota(id) {
        const sorted = [...db.mascotas].sort((a,b)=>b.match - a.match);
        const idx = sorted.findIndex(p=>p.id === id);
        if(idx + 1 < sorted.length) navigate('petProfile', sorted[idx+1].id);
        else navigate('noMorePetsScreen');
    }

    function confirmar(id) {
        if(!db.usuario.adopcionesActivas.find(a=>a.idMascota===id)) db.usuario.adopcionesActivas.push({idMascota: id});
        alert("Solicitud enviada. El dueño revisará tu Match de IA.");
        navigate('chatScreen', id);
    }

    function navigate(view, data=null) {
        const app=document.getElementById('app-content'), nav=document.getElementById('bottom-nav');
        if(['loginScreen','userForm','chatScreen','arScreen','adoptionFormScreen'].includes(view)) nav.classList.add('hidden'); else nav.classList.remove('hidden');
        if(currentAnimationId) { cancelAnimationFrame(currentAnimationId); currentAnimationId=null; }
        
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.replace('text-pink-500', 'text-gray-400'));
        if(view==='petProfile') document.getElementById('nav-home').classList.replace('text-gray-400', 'text-pink-500');
        if(view==='searchScreen') document.getElementById('nav-search').classList.replace('text-gray-400', 'text-pink-500');
        if(view==='statusScreen') document.getElementById('nav-status').classList.replace('text-gray-400', 'text-pink-500');
        if(view==='userProfile') document.getElementById('nav-user').classList.replace('text-gray-400', 'text-pink-500');

        app.innerHTML = ''; app.scrollTop = 0;
        setTimeout(() => { if(views[view]) { app.innerHTML=views[view](data); if(view==='arScreen') init3DPet(data); } }, 10);
    }

    window.onload = () => navigate('loginScreen');
</script>
</body>
</html>
